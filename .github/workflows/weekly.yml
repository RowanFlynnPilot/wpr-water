name: weekly-data-refresh
on:
  schedule:
    # Sundays 15:00 UTC (10am Central). The original 7am UTC slot (2am
    # Central) hit the DNR portal's overnight maintenance window — both
    # July 2026 runs died with connect timeouts to apps.dnr.wi.gov, while
    # a midday dispatch succeeded.
    - cron: "0 15 * * 0"
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m scrapers.dws_pfas_results
      - run: python -m scrapers.dws_chem_results
      - run: python -m scrapers.dnr_fish_advisories
      - run: python -m scrapers.echo_sdwa
      - run: python -m scrapers.uwsp_private_wells
      - run: python -m scrapers.dnr_brrts_sites
      - run: python -m scrapers.sdwis_water_systems
      - run: python -m scrapers.sdwis_violations
      - run: python -m scrapers.sdwis_enforcement
      - run: python -m transforms.build_water
      - name: Commit refreshed data
        run: |
          git config user.name "wpr-water-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Weekly data refresh"
          git push
      - name: Open an issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Weekly data refresh failed $(date -u +%Y-%m-%d)" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} — the live widget keeps serving the last good data until this is fixed."
