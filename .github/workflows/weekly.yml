name: weekly-data-refresh
on:
  schedule:
    - cron: "0 7 * * 0"   # Sundays 7am UTC, matching wpr-trails
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m scrapers.dws_pfas_results
      - run: python -m scrapers.sdwis_water_systems
      - run: python -m scrapers.sdwis_violations
      - run: python -m transforms.build_water
      - name: Commit refreshed data
        run: |
          git config user.name "wpr-water-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Weekly data refresh"
          git push
