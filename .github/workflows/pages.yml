name: deploy-pages
on:
  push:
    branches: [master]
  schedule:
    - cron: "0 8 * * 0"   # Sundays 8am UTC — one hour after weekly-data-refresh,
                          # whose GITHUB_TOKEN push cannot trigger this workflow
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: Assemble site (widget at root, data alongside)
        run: |
          mkdir -p _site/data/processed
          cp -r web/dist/. _site/
          cp data/processed/*.json _site/data/processed/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
